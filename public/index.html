<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action plans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F4EF; --card:#FFFFFF; --ink:#20241F; --ink-soft:#5B5F55; --hairline:#DEDBD0;
    --teal:#0F5C56; --teal-tint:#E3EFEC; --rust:#B34700; --moss:#3F7D53; --gray:#8A8A82;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1A1C18; --card:#24261F; --ink:#EDEBE2; --ink-soft:#A9AC9F; --hairline:#3A3D34;
      --teal:#6FCFC1; --rust:#F2A279; --moss:#9BD1AC; --gray:#9B9B90;
    }
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{max-width:760px; margin:0 auto; padding:2.5rem 1.5rem 4rem;}
  .eyebrow{ font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--teal); font-weight:600; margin:0 0 6px; }
  h1{ font-family:'Fraunces', serif; font-weight:500; font-size:34px; line-height:1.15; margin:0 0 4px; }
  .meta{color:var(--ink-soft); font-size:14px; margin:0 0 2rem;}
  .toolbar{display:flex; gap:10px; margin-bottom:1.5rem; flex-wrap:wrap;}
  input#newName{
    flex:1; min-width:200px;
    border:1px solid var(--hairline); border-radius:8px; padding:10px 14px;
    font-family:inherit; font-size:14px; background:var(--card); color:var(--ink);
  }
  input#newName:focus{outline:2px solid var(--teal); outline-offset:-1px;}
  button.add{ background:var(--teal); color:var(--paper); border:none; border-radius:8px; padding:10px 18px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; }
  button.add:hover{opacity:0.9;}
  .cards{display:flex; flex-direction:column; gap:10px;}
  .card{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:var(--card); border:1px solid var(--hairline); border-radius:10px;
    padding:16px 18px; text-decoration:none; color:inherit;
  }
  .card:hover{border-color:var(--teal);}
  .card-title{font-weight:600; font-size:16px;}
  .card-sub{font-size:13px; color:var(--ink-soft); margin-top:2px;}
  .card-right{display:flex; align-items:center; gap:14px; flex-shrink:0;}
  .badge{font-size:12px; font-weight:500; padding:4px 10px; border-radius:999px; background:var(--teal); color:var(--paper);}
  .badge.done{background:var(--gray);}
  .del{ background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:18px; line-height:1; padding:4px; }
  .del:hover{color:var(--rust);}
  .empty{ text-align:center; padding:3rem 1rem; border:1px dashed var(--hairline); border-radius:10px; color:var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Action plans</p>
  <h1>Customers &amp; prospects</h1>
  <p class="meta">One action plan per customer. Pick one below, or start a new one.</p>

  <div class="toolbar">
    <input id="newName" type="text" placeholder="Customer or prospect name…">
    <button class="add" id="createBtn" type="button">+ New plan</button>
  </div>

  <div class="cards" id="cards"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <p>No customer plans yet. Add your first one above.</p>
  </div>
</div>

<script>
async function loadPlans(){
  const res = await fetch('/api/plans');
  return res.json();
}

async function render(){
  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('emptyState');
  const plans = await loadPlans();
  cardsEl.innerHTML = '';
  if(plans.length === 0){
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  plans.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    const allDone = p.totalCount > 0 && p.openCount === 0;
    card.innerHTML = `
      <a href="/plan.html?id=${p.id}" style="text-decoration:none; color:inherit; flex:1; display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div>
          <div class="card-title">${escapeHtml(p.title)}</div>
          <div class="card-sub">${p.totalCount} ${p.totalCount === 1 ? 'activity' : 'activities'}</div>
        </div>
        <span class="badge ${allDone ? 'done' : ''}">${p.totalCount === 0 ? 'Empty' : (allDone ? 'All done' : p.openCount + ' open')}</span>
      </a>
      <button class="del" title="Delete plan" data-id="${p.id}" data-title="${escapeHtml(p.title)}">×</button>
    `;
    cardsEl.appendChild(card);
  });

  cardsEl.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', onDelete);
  });
}

function escapeHtml(str){ return (str || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function onDelete(e){
  const id = e.currentTarget.dataset.id;
  const title = e.currentTarget.dataset.title;
  if(!confirm(`Delete the plan for "${title}"? This can't be undone.`)) return;
  await fetch(`/api/plans/${id}`, { method: 'DELETE' });
  render();
}

async function createPlan(){
  const input = document.getElementById('newName');
  const btn = document.getElementById('createBtn');
  const title = input.value.trim();
  if(!title) { input.focus(); return; }

  btn.disabled = true;
  btn.textContent = 'Creating…';
  try{
    const res = await fetch('/api/plans', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ title })
    });
    if(!res.ok){
      const text = await res.text().catch(() => '');
      alert(`Could not create the plan (server said: ${res.status}). ${text || 'Try refreshing the page and logging in again.'}`);
      btn.disabled = false;
      btn.textContent = '+ New plan';
      return;
    }
    const data = await res.json();
    window.location.href = `/plan.html?id=${data.id}`;
  }catch(err){
    alert('Could not reach the server. Check your connection and try again.');
    btn.disabled = false;
    btn.textContent = '+ New plan';
  }
}

document.getElementById('createBtn').addEventListener('click', createPlan);
document.getElementById('newName').addEventListener('keydown', e => {
  if(e.key === 'Enter') createPlan();
});

render();

// If this page is restored from the browser's back/forward cache (e.g. the
// user hits the back button), the browser can show a frozen snapshot from
// before a plan was created instead of current data. Force a real reload
// in that case so the list is always accurate.
window.addEventListener('pageshow', (event) => {
  if (event.persisted) {
    window.location.reload();
  }
});

</script>
</body>
</html>
